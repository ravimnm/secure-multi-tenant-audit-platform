version: "3.9"

services:

  #############################################
  # PostgreSQL
  #############################################

  postgres:

    image: postgres:17

    container_name: postgres

    restart: always

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - smtap-network

  #############################################
  # AUTH SERVICE
  #############################################

  auth-service:
    build:
      context: ./auth-service
    image: smtap-auth-service

    container_name: auth-service

    restart: unless-stopped

    depends_on:
      - postgres

    environment:

      AUTH_DB_URL: ${AUTH_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

    ports:
      - "8082:8082"

    networks:
      - smtap-network

  #############################################
  # AUDIT SERVICE
  #############################################

  audit-service:
    build:
      context: ./audit-service
    image: smtap-audit-service

    container_name: audit-service

    restart: unless-stopped

    depends_on:
      - postgres

    environment:

      AUDIT_DB_URL: ${AUDIT_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

    ports:
      - "8081:8081"

    networks:
      - smtap-network

  #############################################
  # SECURITY SERVICE
  #############################################

  security-service:
    build:
      context: ./security-service
    image: smtap-security-service

    container_name: security-service

    restart: unless-stopped

    depends_on:
      - postgres
      - audit-service

    environment:

      SECURITY_DB_URL: ${SECURITY_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      AUDIT_SERVICE_URL: ${AUDIT_SERVICE_URL}

    ports:
      - "8083:8083"

    networks:
      - smtap-network

  #############################################
  # API GATEWAY
  #############################################

  api-gateway:
    build:
      context: ./api-gateway
    image: smtap-api-gateway

    container_name: api-gateway

    restart: unless-stopped

    depends_on:
      - auth-service
      - audit-service
      - security-service

    environment:

      JWT_SECRET: ${JWT_SECRET}

      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      AUDIT_SERVICE_URL: ${AUDIT_SERVICE_URL}
      SECURITY_SERVICE_URL: ${SECURITY_SERVICE_URL}

      FRONTEND_URL: ${FRONTEND_URL}

    ports:
      - "8080:8080"

    networks:
      - smtap-network

  #############################################
  # AGENT
  #############################################

  agent-service:
    build:
      context: ./agent-service
    image: smtap-agent-service

    container_name: agent-service

    restart: unless-stopped

    depends_on:
      - api-gateway

    environment:

      API_GATEWAY_URL: ${API_GATEWAY_URL}

      AGENT_API_KEY: ${AGENT_API_KEY}

      AGENT_ACTOR_ID: ${AGENT_ACTOR_ID}

      AGENT_LOG_PATH: ${AGENT_LOG_PATH}

    volumes:
      - ./logs:/logs

    networks:
      - smtap-network

  #############################################
  # FRONTEND
  #############################################

  frontend:
    build:
      context: ./frontend
    image: smtap-frontend

    container_name: frontend

    restart: unless-stopped

    depends_on:
      - api-gateway

    ports:
      - "80:80"

    networks:
      - smtap-network

#############################################
# NETWORK
#############################################

networks:

  smtap-network:

#############################################
# VOLUMES
#############################################

volumes:

  postgres-data:
