version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - smtap-network

  auth-service:
    image: smtap-auth-service
    container_name: auth-service
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_URL: ${AUTH_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    networks:
      - smtap-network

  audit-service:
    image: smtap-audit-service
    container_name: audit-service
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_URL: ${AUDIT_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    networks:
      - smtap-network

  security-service:
    image: smtap-security-service
    container_name: security-service
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_URL: ${SECURITY_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUDIT_SERVICE_URL: ${AUDIT_SERVICE_URL}
    ports:
      - "8083:8083"
    networks:
      - smtap-network

  api-gateway:
    image: smtap-api-gateway
    container_name: api-gateway
    restart: always
    depends_on:
      - auth-service
      - audit-service
      - security-service
    env_file:
      - .env
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      AUDIT_SERVICE_URL: ${AUDIT_SERVICE_URL}
      SECURITY_SERVICE_URL: ${SECURITY_SERVICE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - smtap-network

  agent-service:
    image: smtap-agent-service
    container_name: agent-service
    restart: always
    depends_on:
      - api-gateway
    env_file:
      - .env
    environment:
      API_GATEWAY_URL: ${API_GATEWAY_URL}
      AGENT_API_KEY: ${AGENT_API_KEY}
      AGENT_LOG_PATH: ${AGENT_LOG_PATH}
      AGENT_ACTOR_ID: ${AGENT_ACTOR_ID}
    volumes:
      - ./logs:/logs
    ports:
      - "9090:9090"
    networks:
      - smtap-network

  frontend:
    image: smtap-frontend
    container_name: frontend
    restart: always
    depends_on:
      - api-gateway
    ports:
      - "80:80"
    networks:
      - smtap-network

volumes:
  postgres-data:

networks:
  smtap-network:
    driver: bridge
